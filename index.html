<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMANE RH</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#F8F8F6;
      color:#1E2B26;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
      padding:40px;
    }

    .container{
      max-width:800px;
    }

    h1{
      font-size:58px;
      letter-spacing:8px;
      font-weight:600;
      margin-bottom:32px;
    }

    p{
      font-size:24px;
      line-height:1.8;
      color:#4E5A55;
      font-weight:300;
    }

    @media(max-width:768px){
      h1{
        font-size:42px;
        letter-spacing:5px;
      }

      p{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>UMANE</h1>

    <p>
      Em breve, a <strong>UMANE</strong> estará no ar com soluções para estruturar e fortalecer a Gestão de Pessoas.
    </p>

  </div>

</body>
</html>
